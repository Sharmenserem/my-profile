<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shammelody | Next-Gen Audio Experience</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* -------------------------------------- */
    /* --- MODERN RESET & VARIABLE SYSTEM --- */
    /* -------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0b10;
      --card-dark: rgba(25, 27, 38, 0.65);
      --border-dark: rgba(255, 255, 255, 0.08);
      --accent-glow: linear-gradient(135deg, #a855f7, #06b6d4);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      
      --bg-light: #f4f5f9;
      --card-light: rgba(255, 255, 255, 0.75);
      --border-light: rgba(0, 0, 0, 0.06);
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text-main);
      background-color: var(--bg-dark);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* Ambient Mesh Backdrop Animation */
    .mesh-background {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -2;
      background: radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 40%);
      background-size: 200% 200%;
      animation: waveBg 15s ease infinite;
    }

    @keyframes waveBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* -------------------------------------- */
    /* --- ULTRA-CLEAN PRELOADER --- */
    /* -------------------------------------- */
    #preloader {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }

    .audio-wave {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 50px;
    }

    .audio-wave span {
      width: 5px;
      height: 20px;
      background: var(--accent-glow);
      border-radius: 10px;
      animation: jump 1.2s ease-in-out infinite;
    }
    .audio-wave span:nth-child(2) { animation-delay: 0.2s; }
    .audio-wave span:nth-child(3) { animation-delay: 0.4s; }
    .audio-wave span:nth-child(4) { animation-delay: 0.6s; }

    @keyframes jump {
      0%, 100% { height: 15px; }
      50% { height: 50px; }
    }

    .load-text {
      font-size: 0.85rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* -------------------------------------- */
    /* --- INTERACTIVE GATEWAY (LOGIN) --- */
    /* -------------------------------------- */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(6, 7, 10, 0.85);
      backdrop-filter: blur(20px);
    }

    #start-prompt {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-dark);
      z-index: 5002;
    }

    .btn-primary {
      padding: 16px 36px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      background: var(--accent-glow);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(168, 85, 247, 0.4);
    }

    .glass-card {
      background: var(--card-dark);
      border: 1px solid var(--border-dark);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .glass-card h2 {
      font-weight: 600;
      margin-bottom: 30px;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .input-field {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      outline: none;
      color: #fff;
      margin-bottom: 20px;
      font-family: inherit;
      transition: border 0.3s ease;
    }

    .input-field:focus {
      border-color: #06b6d4;
    }

    /* -------------------------------------- */
    /* --- APPLICATION DASHBOARD MAIN --- */
    /* -------------------------------------- */
    #main-content {
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 8%;
      border-bottom: 1px solid var(--border-dark);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-family: 'Syncopate', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      font-weight: 700;
      background: var(--accent-glow);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 30px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--text-main);
    }

    /* Hero Branding Header */
    .hero-section {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .profile-avatar {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 24px;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.1);
    }

    .profile-avatar::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--accent-glow);
      z-index: -1;
      opacity: 0.7;
    }

    .hero-section h1 {
      font-family: 'Syncopate', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 8px;
    }

    .hero-section p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 30px;
    }

    /* Engine Search Container */
    .search-wrapper {
      max-width: 500px;
      margin: 0 auto 50px;
      display: flex;
      gap: 10px;
      padding: 0 20px;
    }

    .search-input {
      flex: 1;
      padding: 14px 20px;
      background: var(--card-dark);
      border: 1px solid var(--border-dark);
      border-radius: 30px;
      color: #fff;
      outline: none;
      font-family: inherit;
    }

    .btn-secondary {
      padding: 12px 24px;
      border-radius: 30px;
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      border: 1px solid var(--border-dark);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }

    /* Dynamic Track Grid */
    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4% 60px;
    }

    .music-card {
      background: var(--card-dark);
      border: 1px solid var(--border-dark);
      border-radius: 20px;
      padding: 24px;
      text-align: left;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .music-card:hover {
      transform: translateY(-5px);
      border-color: rgba(6, 182, 212, 0.4);
    }

    .music-card h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    audio {
      width: 100%;
      margin-bottom: 20px;
      filter: invert(0.9) hue-rotate(180deg); 
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .action-btn {
      padding: 10px 4px;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .action-btn i {
      font-size: 1.1rem;
      background: var(--accent-glow);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Interactive Critic Box */
    .critic-engine-box {
      margin-top: 15px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #c4b5fd;
      border-left: 2px solid #a855f7;
    }

    /* Dark/Light Switches */
    .theme-trigger {
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    body.light-mode {
      --bg-dark: var(--bg-light);
      --card-dark: var(--card-light);
      --border-dark: var(--border-light);
      --text-main: #1f2937;
      --text-muted: #6b7280;
    }
    body.light-mode .input-field {
      background: #fff;
      color: #000;
    }
    body.light-mode audio {
      filter: none;
    }
    body.light-mode .search-input {
      background: var(--card-light);
      color: #000;
    }

    /* Social Core Dock */
    .social-dock {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px 0;
    }

    .dock-item {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--card-dark);
      border: 1px solid var(--border-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      font-size: 1.2rem;
      text-decoration: none;
      transition: transform 0.3s, color 0.3s;
    }

    .dock-item:hover {
      transform: scale(1.1);
    }
    .dock-item.insta-premium:hover { color: #e1306c; }
    .dock-item.fb-premium:hover { color: #1877f2; }
    .dock-item.yt-premium:hover { color: #ff0000; }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .hero-section h1 { font-size: 2.2rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <div class="mesh-background"></div>

  <!-- PRELOADER ENGINE -->
  <div id="preloader">
    <div class="audio-wave">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="load-text">Shammelody Architecture</div>
  </div>

  <!-- AUTH / GATEWAY SYSTEM LAYER -->
  <div id="login-overlay">
    <!-- Active background ambient loop configuration -->
    <audio id="bg-music" loop src="https://files.catbox.moe/1s4hgu.mp3"></audio>

    <div id="start-prompt">
      <button class="btn-primary" onclick="startSite()">Enter Portal & Stream Ambient Audio</button>
    </div>

    <div class="glass-card" style="display: none;" id="login-box">
      <h2>Secure Access</h2>
      <input type="text" class="input-field" placeholder="User ID/Access Token">
      <input type="password" class="input-field" placeholder="Access Cipher">
      <button class="btn-primary" style="width:100%;" onclick="loginSuccess(event)">Authenticate Device</button>
    </div>
  </div>

  <!-- MAIN INTERACTIVE SPACE -->
  <div id="main-content">
    <nav class="navbar">
      <div class="logo">SHAMMELODY</div>
      <ul class="nav-links">
        <li><a href="#" onclick="resetEngine()">Tracks</a></li>
        <li><a href="https://instagram.com/_shammelody" target="_blank">Instagram Hub</a></li>
        <li>
          <div class="theme-trigger" onclick="toggleFramework()">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </div>
        </li>
      </ul>
    </nav>

    <div class="hero-section">
      <div class="profile-avatar">
        <img src="https://picsum.photos/300" alt="Sharmen Serem Profile">
      </div>
      <h1>SHAMMELODY</h1>
      <p>Direct File Storage, Studio Monitoring & Smart Critic Access</p>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Query custom vault or YouTube Engine..." oninput="filterSongs()">
      <button class="btn-secondary" onclick="resetEngine()">Reset</button>
    </div>

    <!-- Active dynamic target grids -->
    <div class="track-grid" id="music-list"></div>

    <div class="social-dock">
      <a href="https://instagram.com/_shammelody" target="_blank" class="dock-item insta-premium">
        <i class="fa-brands fa-instagram"></i>
      </a>
      <a href="https://www.facebook.com/shammelody0" target="_blank" class="dock-item fb-premium">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
      <a href="https://youtube.com/@shammelody?si=pZMbELGJNNEX6kc1" target="_blank" class="dock-item yt-premium">
        <i class="fa-brands fa-youtube"></i>
      </a>
    </div>
  </div>

  <script>
    // --- API INITIALIZATIONS ---
    const apiKey = "bwm_live_b85f9f75afaf5f4c3660fe53518c241f27dbfb1d45938e62"; 
    const model = 'gemini-2.5-flash-preview-09-2025';
    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

    const preloader = document.getElementById('preloader');
    const loginOverlay = document.getElementById('login-overlay');
    const bgMusic = document.getElementById('bg-music');
    const musicList = document.getElementById('music-list');

    // Local Song Inventory
    const songs = [
      {
        title: "Dream World",
        mp3: "https://files.catbox.moe/y9q4ws.mp3",
        mp4: "https://files.catbox.moe/5fe9sq.mp4"
      },
      {
        title: "Ocean Vibes",
        mp3: "https://files.catbox.moe/1s4hgu.mp3",
        mp4: "https://files.catbox.moe/vwbek0.mp4"
      }
    ];

    const originalSongs = [...songs];

    // --- LIFE CYCLE FLOWS ---
    window.onload = function() {
      setTimeout(() => {
        if (preloader) preloader.style.display = 'none';
        if (loginOverlay) loginOverlay.style.display = 'flex';
      }, 2500); 
    };

    function startSite() {
      document.getElementById('start-prompt').style.display = 'none';
      document.getElementById('login-box').style.display = 'block';
      bgMusic.play().catch(e => console.log("Autoplay restrictions managed.", e));
    }

    function loginSuccess(e) {
      e.preventDefault();
      loginOverlay.style.display = 'none';
      const main = document.getElementById('main-content');
      main.style.display = 'block';
      setTimeout(() => main.style.opacity = '1', 50);
      bgMusic.pause();
      renderSongs(originalSongs);
    }

    // --- DOWNLOAD MECHANISM ENGINE ---
    async function directDownload(url, filename) {
      const targetBtn = event.currentTarget;
      const initialText = targetBtn.innerHTML;
      targetBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Syncing...";
      
      try {
        const response = await fetch(url);
        if(!response.ok) throw new Error("Network restriction encountered");
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = blobUrl;
        anchor.download = filename || "shammelody-track.mp3";
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(blobUrl);
      } catch (error) {
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.target = '_blank';
        anchor.download = filename;
        anchor.click();
      } finally {
        targetBtn.innerHTML = initialText;
      }
    }

    // --- RENDERING ROUTINES ---
    function renderSongs(songArray) {
      if (!musicList) return;
      musicList.innerHTML = '';
      songArray.forEach(song => {
        const cleanId = 'review-' + song.title.replace(/\s|[^a-zA-Z0-9]/g, '');
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
          <h3><i class="fa-solid fa-music"></i> ${song.title}</h3>
          <audio controls src="${song.mp3}"></audio>
          <div class="action-row">
            <button class="action-btn" onclick="directDownload('${song.mp3}', '${song.title}.mp3')">
              <i class="fa-solid fa-file-audio"></i> Audio
            </button>
            <button class="action-btn" onclick="directDownload('${song.mp4}', '${song.title}.mp4')">
              <i class="fa-solid fa-file-video"></i> Video
            </button>
            <button class="action-btn" onclick="generateReview('${song.title}', '${cleanId}')">
              <i class="fa-solid fa-wand-magic-sparkles"></i> Critique
            </button>
          </div>
          <div id="${cleanId}" class="critic-engine-box" style="display:none;"></div>
        `;
        musicList.appendChild(card);
      });
    }

    function renderYouTubeSongs(songArray) {
      if (!musicList) return;
      musicList.innerHTML = '';
      songArray.forEach(song => {
        const cleanId = 'review-' + song.title.replace(/\s|[^a-zA-Z0-9]/g, '');
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
          <h3><i class="fa-brands fa-youtube" style="color: #ff0000;"></i> ${song.title}</h3>
          <iframe width="100%" height="180" src="${song.mp4}" frameborder="0" allowfullscreen style="border-radius:12px; margin-bottom:15px; border:1px solid var(--border-dark);"></iframe>
          <div class="action-row" style="grid-template-columns: repeat(2, 1fr);">
            <button class="action-btn" onclick="window.open('${song.mp4}', '_blank')">
              <i class="fa-solid fa-arrow-up-right-from-square"></i> YouTube
            </button>
            <button class="action-btn" onclick="generateReview('${song.title}', '${cleanId}')">
              <i class="fa-solid fa-wand-magic-sparkles"></i> Critique
            </button>
          </div>
          <div id="${cleanId}" class="critic-engine-box" style="display:none;"></div>
        `;
        musicList.appendChild(card);
      });
    }

    // --- SEARCH LOGIC CORE ---
    function filterSongs() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      
      if (!query) {
        renderSongs(originalSongs);
        return;
      }

      const matched = songs.filter(s => s.title.toLowerCase().includes(query));

      if (matched.length > 0) {
        renderSongs(matched);
      } else {
        fetchSongsFromYouTube(query);
      }
    }

    async function fetchSongsFromYouTube(query) {
      const youtubeApiKey = "AIzaSyDu-3cMyAodP6UZxdqPbWLUYYZlQHXaUeo"; 
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + ' music')}&type=video&videoCategoryId=10&maxResults=6&key=${youtubeApiKey}`;

      try {
        musicList.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:var(--text-muted);"><i class="fa-solid fa-circle-notch fa-spin"></i> Crawling YouTube Cloud...</div>';
        
        const response = await fetch(url);
        const data = await response.json();

        if (!data.items || data.items.length === 0) {
          musicList.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:var(--text-muted);">No cloud matching indexes discovered.</div>';
          return;
        }

        const youtubeSongs = data.items.map(item => ({
          title: item.snippet.title,
          mp3: '',
          mp4: `https://www.youtube.com/embed/${item.id.videoId}`
        }));

        renderYouTubeSongs(youtubeSongs);
      } catch (error) {
        console.error("Cloud Error:", error);
        musicList.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:#ef4444;"><i class="fa-solid fa-triangle-exclamation"></i> Cloud index requests timed out.</div>';
      }
    }

    // --- ARTIFICIAL CRITIQUE GENERATION ---
    async function generateReview(songTitle, elementId) {
      const output = document.getElementById(elementId);
      output.style.display = "block";
      output.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Synthesizing musical critique...";

      const promptPayload = {
        contents: [{ parts: [{ text: `Provide a highly artistic, sophisticated, positive 3-sentence critique for a track titled "${songTitle}".` }] }],
        systemInstruction: { parts: [{ text: "You are an elite, poetic music theorist." }] }
      };

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(promptPayload)
        });
        const data = await response.json();
        output.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Analysis process completed.";
      } catch (e) {
        output.innerText = "Critique system metrics temporarily offline.";
      }
    }

    // --- UTILITIES ---
    function resetEngine() {
      document.getElementById('searchInput').value = '';
      renderSongs(originalSongs);
    }

    function toggleFramework() {
      document.body.classList.toggle('light-mode');
    }
  </script>
</body>
</html>
